name: OpenWeer
options:
  bundleIdPrefix: nl.openweer
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: nl
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.0.0"

targets:
  OpenWeer:
    type: application
    platform: iOS
    sources:
      - path: OpenWeer
        excludes:
          - "**/.DS_Store"
      # Pure helpers also compiled into the widget extension; included here
      # so the OpenWeerTests target (which loads the app binary) can test them.
      - path: OpenWeerWidgets/Provider/WidgetRefreshPolicy.swift
      - path: OpenWeerWidgets/RainNowcast/RainBarChart.swift
      - path: OpenWeerWidgets/RainMap/TileMath.swift
    resources:
      - OpenWeer/Resources
    info:
      path: OpenWeer/Info.plist
      properties:
        CFBundleDisplayName: OpenWeer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: BrandBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "OpenWeer gebruikt je locatie om de regen en het weer voor de plek waar je bent te tonen."
        NSUserNotificationsUsageDescription: "OpenWeer kan je waarschuwen voordat het bij jou gaat regenen."
        UIBackgroundModes:
          - remote-notification
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - nl.openweer.app.refresh
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
        OPENWEER_API_BASE: $(OPENWEER_API_BASE)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
        CFBundleLocalizations:
          - nl
          - en
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.openweer.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: OpenWeer/OpenWeer.entitlements
      configs:
        Debug:
          OPENWEER_API_BASE: https://openweer.nl
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG OPENWEER_DEV
          INFOPLIST_PREPROCESS: NO
        Release:
          OPENWEER_API_BASE: https://openweer.nl
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          INFOPLIST_PREPROCESS: NO
    dependencies:
      - package: MapLibre
        product: MapLibre
      - target: OpenWeerWidgets

  OpenWeerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenWeerWidgets
        excludes:
          - "**/.DS_Store"
      # Shared with the main app via multi-target source membership.
      # These files must remain dependency-free of UIKit / MapLibre so they
      # compile against the app-extension SDK.
      - path: OpenWeer/Core/Models/WeatherResponse.swift
      - path: OpenWeer/Core/Models/ForecastResponse.swift
      - path: OpenWeer/Core/Models/RainResponse.swift
      - path: OpenWeer/Core/Models/Frame.swift
      - path: OpenWeer/Core/Models/HealthResponse.swift
      - path: OpenWeer/Core/Network/APIClient.swift
      - path: OpenWeer/Core/Network/APIError.swift
      - path: OpenWeer/Core/Location/KnownLocations.swift
      - path: OpenWeer/Core/Theme/Colors.swift
      - path: OpenWeer/Main/WeatherCard/WeatherIcon.swift
      - path: OpenWeer/Core/Sharing/AppGroup.swift
      - path: OpenWeer/Core/Sharing/SharedLocation.swift
      - path: OpenWeer/Core/Sharing/SharedSnapshot.swift
      - path: OpenWeer/Core/LiveActivity/RainActivityAttributes.swift
      # Resources need explicit buildPhase: resources here because XcodeGen's
      # top-level `resources:` block didn't generate a copy phase for this
      # target — leaving the widget without Assets.car and all named colors
      # resolving to clear.
      - path: OpenWeer/Resources/Assets.xcassets
        buildPhase: resources
      - path: OpenWeer/Resources/Localizable.xcstrings
        buildPhase: resources
    info:
      path: OpenWeerWidgets/Info.plist
      properties:
        CFBundleDisplayName: OpenWeer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleLocalizations:
          - nl
          - en
        OPENWEER_API_BASE: $(OPENWEER_API_BASE)
        NSLocationWhenInUseUsageDescription: "OpenWeer gebruikt je locatie om het weer voor jouw plek op het widget te tonen."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.openweer.app.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: OpenWeerWidgets/OpenWeerWidgets.entitlements
      configs:
        Debug:
          OPENWEER_API_BASE: https://openweer.nl
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG OPENWEER_DEV
          INFOPLIST_PREPROCESS: NO
        Release:
          OPENWEER_API_BASE: https://openweer.nl
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          INFOPLIST_PREPROCESS: NO

  OpenWeerTests:
    type: bundle.unit-test
    platform: iOS
    sources: OpenWeerTests
    dependencies:
      - target: OpenWeer
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenWeer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OpenWeer"
        GENERATE_INFOPLIST_FILE: YES

  OpenWeerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: OpenWeerUITests
    dependencies:
      - target: OpenWeer
    settings:
      base:
        TEST_TARGET_NAME: OpenWeer
        GENERATE_INFOPLIST_FILE: YES

  # Dedicated UI-test target for fastlane `snapshot`. Kept separate from
  # OpenWeerUITests so the regular test suite stays fast and doesn't pull in
  # SnapshotHelper.swift's screenshot-export side effects.
  OpenWeerSnapshots:
    type: bundle.ui-testing
    platform: iOS
    sources: OpenWeerSnapshots
    dependencies:
      - target: OpenWeer
    settings:
      base:
        TEST_TARGET_NAME: OpenWeer
        GENERATE_INFOPLIST_FILE: YES

schemes:
  OpenWeer:
    build:
      targets:
        OpenWeer: all
        OpenWeerTests: [test]
        OpenWeerUITests: [test]
    test:
      config: Debug
      targets:
        - OpenWeerTests
        - OpenWeerUITests
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

  # Scheme that fastlane `snapshot` drives. Builds the app + the snapshots-only
  # UI-test target; running the test capture produces the App Store screenshots.
  OpenWeerSnapshots:
    build:
      targets:
        OpenWeer: all
        OpenWeerSnapshots: [test]
    test:
      config: Debug
      targets:
        - OpenWeerSnapshots
    run:
      config: Debug
    archive:
      config: Release
